syntax = "proto3";

option csharp_namespace = "DAMA.Software.GrpcContracts";
package dama.validate_course;

service ClassExistence {
  rpc ScheduledExists(ScheduledExistsRequest) returns (ClassExistsResponse);
  rpc UniqueExists   (UniqueExistsRequest)    returns (ClassExistsResponse);
}

message ScheduledExistsRequest {
  string class_id   = 1;
  string class_date = 2;
}

message UniqueExistsRequest {
  string class_id = 1;
}

// `exists` is the only field guaranteed to be meaningful when the class is not
// found. When `exists == true`, the time fields (and `class_date` for unique
// classes) carry the canonical class metadata so consumers (e.g.
// Attendance) can denormalize them onto attendance rows without a
// separate read.
message ClassExistsResponse {
  bool   exists            = 1;
  string start_time        = 2; // "HH:MM:SS"
  string end_time          = 3; // "HH:MM:SS"
  string class_date        = 4; // "YYYY-MM-DD" (unique only; empty for scheduled, caller already passes the date)
  int32  max_student_limit = 5; // 0 = no limit; otherwise the maximum number of distinct students that may attend
}
