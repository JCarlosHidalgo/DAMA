<div [class]="styles().root()">
  <div [class]="styles().head()">
    <span [class]="styles().label()">{{ label() }}</span>
    @if (icon()) {
      <app-icon [name]="icon()!" />
    }
  </div>
  <div [class]="styles().value()">{{ value() }}</div>
  @if (delta(); as d) {
    <div [class]="styles().delta()">
      {{ d.value }}
    </div>
  }
  @if (sub()) {
    <div [class]="styles().sub()">{{ sub() }}</div>
  }
</div>
