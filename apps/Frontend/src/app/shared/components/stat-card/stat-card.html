<div class="stat-card">
  <div class="head">
    <span class="t-label-up">{{ label() }}</span>
    @if (icon()) {
      <app-icon [name]="icon()!" />
    }
  </div>
  <div class="value t-num-lg tnum">{{ value() }}</div>
  @if (delta(); as d) {
    <div class="delta" [class.is-up]="d.sign === 'up'" [class.is-down]="d.sign === 'down'">
      {{ d.value }}
    </div>
  }
  @if (sub()) {
    <div class="sub t-small">{{ sub() }}</div>
  }
</div>
