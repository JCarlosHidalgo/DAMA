<div [class]="styles.wrap()">
  <zxing-scanner
    [formats]="formats"
    [enable]="enabled()"
    previewFitMode="cover"
    (scanSuccess)="onScan($event)"
  />
  <span [class]="styles.bracket() + ' ' + styles.bracketTopLeft()"></span>
  <span [class]="styles.bracket() + ' ' + styles.bracketTopRight()"></span>
  <span [class]="styles.bracket() + ' ' + styles.bracketBottomLeft()"></span>
  <span [class]="styles.bracket() + ' ' + styles.bracketBottomRight()"></span>
</div>
