<div [class]="styles.root()">
  <div [class]="styles.wrap()">
    <qrcode
      [qrdata]="payload()"
      [width]="size()"
      [margin]="2"
      errorCorrectionLevel="M"
      elementType="canvas"
    />
  </div>
  @if (title() || subtitle()) {
    <div [class]="styles.meta()">
      @if (title()) {
        <div [class]="styles.title()">{{ title() }}</div>
      }
      @if (subtitle()) {
        <div [class]="styles.subtitle()">{{ subtitle() }}</div>
      }
    </div>
  }
</div>
