<header [class]="styles.root()">
  <div [class]="styles.text()">
    <h1 [class]="styles.title()">{{ title() }}</h1>
    @if (subtitle()) {
      <p [class]="styles.subtitle()">{{ subtitle() }}</p>
    }
  </div>
  <div [class]="styles.actions()">
    <ng-content select="[actions]" />
  </div>
</header>
