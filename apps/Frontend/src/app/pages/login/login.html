<div [class]="styles.grid()">
  <div [class]="styles.themeToggle()">
    <app-theme-toggle />
  </div>
  <aside [class]="styles.brandPanel()">
    <div [class]="styles.brand()">
      <div [class]="styles.brandMark()">D</div>
      <div [class]="styles.brandName()">DAMA</div>
    </div>
    <h2 [class]="styles.title()">Bienvenido de nuevo.</h2>
    <p [class]="styles.tagline()">Gestiona clases, asistencia y pagos en un solo lugar.</p>
  </aside>

  <section [class]="styles.cardPanel()">
    <mat-card [class]="styles.card()">
      <mat-card-header>
        <mat-card-title>Inicia sesión</mat-card-title>
        <mat-card-subtitle>Ingresa con tu cuenta para continuar</mat-card-subtitle>
      </mat-card-header>
      <mat-card-content>
        <form [formGroup]="form" (ngSubmit)="onSubmit()" [class]="styles.form()">
          <mat-form-field appearance="outline">
            <mat-label>Usuario</mat-label>
            <input
              matInput
              formControlName="username"
              autocomplete="username"
              autocapitalize="none"
              autocorrect="off"
              spellcheck="false"
              inputmode="text"
            />
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Contraseña</mat-label>
            <input
              matInput
              [type]="showPassword() ? 'text' : 'password'"
              formControlName="password"
              autocomplete="current-password"
            />
            <button
              mat-icon-button
              matSuffix
              type="button"
              (click)="togglePasswordVisibility()"
              [attr.aria-label]="showPassword() ? 'Ocultar contraseña' : 'Mostrar contraseña'"
              [attr.aria-pressed]="showPassword()"
            >
              <fa-icon [icon]="showPassword() ? faEye : faEyeSlash"></fa-icon>
            </button>
          </mat-form-field>

          @if (errorMessage()) {
            <p [class]="styles.error()">{{ errorMessage() }}</p>
          }

          <button
            mat-flat-button
            color="primary"
            type="submit"
            [class]="styles.submit()"
            [disabled]="loading()"
          >
            @if (loading()) {
              <mat-spinner diameter="20"></mat-spinner>
            } @else {
              Entrar
            }
          </button>
        </form>
      </mat-card-content>
    </mat-card>
  </section>
</div>
