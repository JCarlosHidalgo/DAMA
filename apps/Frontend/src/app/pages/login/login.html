<div class="login-grid">
  <aside class="brand-panel">
    <div class="brand">
      <div class="brand-mark">D</div>
      <div class="brand-name">DAMA</div>
    </div>
    <h2 class="t-display">Bienvenido de nuevo.</h2>
    <p class="t-body-md tagline">Gestiona clases, asistencia y pagos en un solo lugar.</p>
  </aside>

  <section class="card-panel">
    <mat-card class="login-card">
      <mat-card-header>
        <mat-card-title>Inicia sesión</mat-card-title>
        <mat-card-subtitle>Ingresa con tu cuenta para continuar</mat-card-subtitle>
      </mat-card-header>
      <mat-card-content>
        <form [formGroup]="form" (ngSubmit)="onSubmit()" class="login-form">
          <mat-form-field appearance="outline">
            <mat-label>Usuario</mat-label>
            <input
              matInput
              formControlName="username"
              autocomplete="username"
              autocapitalize="none"
              autocorrect="off"
              spellcheck="false"
              inputmode="text"
            />
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Contraseña</mat-label>
            <input
              matInput
              [type]="showPassword() ? 'text' : 'password'"
              formControlName="password"
              autocomplete="current-password"
            />
            <button
              mat-icon-button
              matSuffix
              type="button"
              (click)="togglePasswordVisibility()"
              [attr.aria-label]="showPassword() ? 'Ocultar contraseña' : 'Mostrar contraseña'"
              [attr.aria-pressed]="showPassword()"
            >
              <fa-icon [icon]="showPassword() ? faEye : faEyeSlash"></fa-icon>
            </button>
          </mat-form-field>

          @if (errorMessage()) {
            <p class="error-text">{{ errorMessage() }}</p>
          }

          <button
            mat-flat-button
            color="primary"
            type="submit"
            class="submit-btn"
            [disabled]="loading()"
          >
            @if (loading()) {
              <mat-spinner diameter="20"></mat-spinner>
            } @else {
              Entrar
            }
          </button>
        </form>
      </mat-card-content>
    </mat-card>
  </section>
</div>
