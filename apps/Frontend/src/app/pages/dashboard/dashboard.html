<mat-sidenav-container [class]="styles().container()">
  <mat-sidenav
    #sidenav
    [mode]="isHandset() ? 'over' : 'side'"
    [opened]="!isHandset()"
    [class.collapsed]="collapsed()"
    autoFocus="dialog"
  >
    <div [class]="styles().brand()">
      <fa-icon [class]="styles().brandIcon()" [icon]="faSchool" />
      <span [class]="styles().brandText()">DAMA</span>
    </div>
    <mat-nav-list>
      @for (tab of tabs(); track tab.path) {
        <a
          mat-list-item
          [routerLink]="tab.path"
          [class.active-link]="activeSegment() === tab.path"
          [title]="tab.label"
        >
          <fa-icon matListItemIcon [icon]="tab.icon" />
          <span matListItemTitle [class]="styles().navLabel()">{{ tab.label }}</span>
        </a>
      }
    </mat-nav-list>
  </mat-sidenav>
  <mat-sidenav-content>
    <mat-toolbar color="primary">
      <button mat-icon-button (click)="toggleSidenav()" aria-label="Alternar menú">
        <fa-icon [icon]="faMenu" />
      </button>
      <span [class]="styles().toolbarSpacer()"></span>
      <span [class]="styles().userLabel()">{{ displayName() }}</span>
      <button mat-icon-button (click)="onLogout()" aria-label="Cerrar sesión">
        <fa-icon [icon]="faLogout" />
      </button>
    </mat-toolbar>
    <main [class]="styles().content()">
      <router-outlet />
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
