info:
  name: "Client: Search Student By Name"
  type: http
  seq: 7

http:
  method: GET
  url: "{{API_PATH}}/api/auth/students/search?name=Student Example"
  params:
    - name: name
      value: Student Example
      type: query
  auth:
    type: bearer
    token: "{{Client_JWT}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
