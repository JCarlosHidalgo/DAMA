info:
  name: "Student: List My Scheduled Attendance"
  type: http
  seq: 3

http:
  method: GET
  url: "{{API_PATH}}/api/attendance/attendance/scheduled/me?index=0"
  query:
    - name: index
      value: "0"
  auth:
    type: bearer
    token: "{{Student_JWT}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
