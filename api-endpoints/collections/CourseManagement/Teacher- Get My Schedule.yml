info:
  name: "Teacher: Get My Schedule"
  type: http
  seq: 6

http:
  method: GET
  url: "{{API_PATH}}/api/course-management/course/teacher/me?weekPaginationIndex=0"
  query:
    - name: weekPaginationIndex
      value: "0"
  auth:
    type: bearer
    token: "{{Teacher_JWT}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
