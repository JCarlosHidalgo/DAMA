user nginx;
worker_processes auto;

error_log   /var/log/nginx/error.log notice;
pid         /var/run/nginx.pid;

events {
    worker_connections  1024;
}

# Adding a backend:
#   1) Declare an upstream pointing at the container name:
#        upstream <kebab-name> {
#            server <ContainerName>;
#        }
#   2) Declare a location with the trailing-slash prefix:
#        location /api/<kebab-name>/ {
#            proxy_pass http://<kebab-name>;
#        }
# All paths are lowercase kebab-case (location matching is case-sensitive);
# /api/Auth/... will not match /api/auth/. Rate-limit zones and WebSocket
# locations (see below) declare their own proxy_set_header and must repeat the
# forwarded headers since nginx does not inherit server-level headers when a
# location overrides them.
http {
    upstream auth {
        server AuthService;
    }

    upstream course-management {
        server CourseManagementService;
    }

    upstream attendance {
        server AttendanceService;
    }

    upstream credentials {
        server CredentialsService;
    }

    upstream payment {
        server PaymentService;
    }

    # Per-IP rate limit zones (shared memory; ~160k unique IPs per 10m).
    # login   — brute-force protection on /api/auth/login.
    # callback — bounds Todotix callback retries and forged-sig probing.
    limit_req_zone $binary_remote_addr zone=login:10m    rate=5r/m;
    limit_req_zone $binary_remote_addr zone=callback:10m rate=60r/m;

    map $http_origin $cors_allow_origin {
        default "";
        "~^https?://(localhost|127\.0\.0\.1)(:\d+)?$" $http_origin;
        "~^https://(www\.)?dama-software\.org$"       $http_origin;
    }

    server {
        listen 80;

        # Forwarded headers propagated to backends. X-Forwarded-Proto comes from
        # Cloudflare Tunnel as "https" in prod; we preserve it instead of
        # overwriting with $scheme (which is "http" inside the container network).
        # Inherited by locations that do not declare their own proxy_set_header.
        proxy_set_header Host              $http_host;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header X-Forwarded-Host  $http_host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP         $remote_addr;

        # CORS headers applied to all /api/* responses.
        add_header Access-Control-Allow-Origin      $cors_allow_origin       always;
        add_header Access-Control-Allow-Credentials "true"                   always;
        add_header Access-Control-Allow-Methods     "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
        add_header Access-Control-Allow-Headers     "Authorization, Content-Type, Accept, Origin, X-Requested-With, X-SignalR-User-Agent" always;
        add_header Access-Control-Max-Age           "86400"                  always;
        add_header Vary                             "Origin"                 always;

        # Handle CORS preflight requests in nginx directly.
        if ($request_method = OPTIONS) {
            return 204;
        }

        # Rate-limited: brute-force protection. Burst absorbs typo-storms;
        # sustained rate is 5/min/IP.
        location = /api/auth/login {
            limit_req zone=login burst=2 nodelay;
            limit_req_status 429;
            proxy_pass http://auth;
        }

        location /api/auth/ {
            proxy_pass http://auth;
        }

        location /api/course-management/ {
            proxy_pass http://course-management;
        }

        # WebSocket location declares its own proxy_set_header for Upgrade/Connection,
        # so nginx does NOT inherit the server-level headers here — repeat the forwarded
        # headers explicitly to keep them propagated.
        location /api/attendance/hubs/ {
            proxy_pass http://attendance/hubs/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        "upgrade";
            proxy_set_header Host              $http_host;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_set_header X-Forwarded-Host  $http_host;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        location /api/attendance/ {
            proxy_pass http://attendance;
        }

        location /api/credentials/ {
            proxy_pass http://credentials;
        }

        # Schema admin (DbGate). Prod-only service, but this nginx.conf is shared
        # with dev — a static upstream would fail the dev gateway at boot since
        # DbGate is absent there. The Docker embedded resolver (127.0.0.11) plus a
        # variable defers name resolution to request time, so dev just 502s on this
        # path instead of refusing to start. proxy_pass carries no trailing slash:
        # DbGate runs under WEB_ROOT=/api/db-gate and expects the full prefix.
        # DbGate uses WebSockets, so this location declares its own headers and must
        # repeat the forwarded ones (server-level headers are not inherited here).
        location /api/db-gate/ {
            resolver 127.0.0.11 valid=30s;
            set $dbgate_upstream "DbGate:3000";
            proxy_pass http://$dbgate_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        "upgrade";
            proxy_set_header Host              $http_host;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_set_header X-Forwarded-Host  $http_host;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Rate-limited: bounds Todotix callback retries and forged-sig probing.
        # 60/min/IP with a generous burst handles legitimate retries; floods 429.
        location = /api/payment/qr/callback {
            limit_req zone=callback burst=10 nodelay;
            limit_req_status 429;
            proxy_pass http://payment;
        }

        location /api/payment/ {
            proxy_pass http://payment;
        }
    }
}